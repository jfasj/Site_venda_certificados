document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ont-family:'Sora',sans-serif;font-weight:600;font-size:clamp(22px,3vw,34px);line-height:1.35;letter-spacing:-.02em\">Certificado digital não é mais <span style=\"color:#7d8aa0;text-decoration:line-through;text-decoration-color:rgba(125,138,160,.5)\">burocracia de cartório<\u002Fspan>.<\u002Fp>\n    <p style=\"font-size:clamp(16px,1.6vw,19px);line-height:1.65;color:#a7b3c6;margin-top:26px\">Na Absoluta, você emite seu e-CPF ou e-CNPJ direto do celular ou computador — sem deslocamento, sem fila, sem dor de cabeça. Como <span style=\"color:#e7ecf4\">Autoridade de Registro credenciada<\u002Fspan>, seu certificado tem validade jurídica total, reconhecido em todos os órgãos públicos, bancos e sistemas do Brasil.<\u002Fp>\n    <p style=\"font-size:clamp(16px,1.6vw,19px);line-height:1.65;color:#a7b3c6;margin-top:18px\">Em poucos minutos de videoconferência, você sai com o certificado instalado e pronto pra assinar documentos, emitir notas fiscais e acessar sistemas do governo.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ============ PAIN ============ -->\n  <section style=\"position:relative;z-index:2;max-width:1080px;margin:0 auto;padding:50px 28px\">\n    <h2 style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:clamp(26px,3.4vw,40px);letter-spacing:-.02em;text-align:center;margin-bottom:14px\">Você já passou por alguma dessas?<\u002Fh2>\n    <p style=\"text-align:center;color:#9aa6ba;font-size:16px;margin-bottom:40px\">Se você se identificou com pelo menos uma, a Absoluta resolve isso hoje.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px\">\n      <sc-for list=\"{{ pains }}\" as=\"p\" hint-placeholder-count=\"6\">\n        <div style=\"display:flex;gap:14px;align-items:flex-start;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:20px 22px\">\n          <span style=\"font-size:22px;line-height:1.2;flex:none\">{{ p.icon }}<\u002Fspan>\n          <span style=\"fon one;{{ pl.ctaShadow }}\">{{ pl.cta }}<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- coupon -->\n    <div style=\"max-width:560px;margin:26px auto 0;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:22px 24px\">\n      <div style=\"font-size:14px;color:#bcc7d8;margin-bottom:12px;display:flex;align-items:center;gap:8px\">🎁 Tem um cupom de desconto?<\u002Fdiv>\n      <div style=\"display:flex;gap:10px;flex-wrap:wrap\">\n        <input value=\"{{ coupon }}\" oninput=\"{{ onCoupon }}\" placeholder=\"Digite seu cupom\" style=\"flex:1;min-width:180px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:13px 20px;color:#f2f5fa;font-family:'Manrope',sans-serif;font-size:15px;outline:none\">\n        <button onclick=\"{{ applyCoupon }}\" style=\"background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);color:#f2f5fa;font-weight:600;font-size:15px;padding:13px 24px;border-radius:999px;cursor:pointer;font-family:'Manrope',sans-serif\">Aplicar<\u002Fbutton>\n      <\u002Fdiv>\n      <sc-if value=\"{{ couponMsg }}\" hint-placeholder-val=\"\">\n        <div style=\"margin-top:12px;font-size:13.5px;color:{{ accent }}\">{{ couponMsg }}<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ OBJECTIONS ============ -->\n  <section style=\"position:relative;z-index:2;max-width:920px;margin:0 auto;padding:60px 28px\">\n    <h2 style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:clamp(24px,3.2vw,38px);letter-spacing:-.02em;text-align:center;margin-bottom:40px\">Ainda com dúvida? A gente esclarece.<\u002Fh2>\n    <div style=\"display:flex;flex-direction:column;gap:16px\">\n      <sc-for list=\"{{ objections }}\" as=\"o\" hint-placeholder-count=\"5\">\n        <div style=\"background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:24px 26px\">\n          <div style=\"font-family:'Sora',sans-serif;font-weight:600;font-size:16.5px;color:#e7ecf4;margin-bottom:10px\">{{ o.q }}<\u002Fdiv>\n          <div style=\"font-size:15px;line-height:1.6;color:#a7b3c6\">{{ o.a }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ GUARANTEE ============ -->\n  <section style=\"position:relative;z-index:2;max-width:880px;margin:0 auto;padding:30px 28px 60px\">\n    <div style=\"position:relative;text-align:center;background:linear-gradient(160deg, rgba(54,217,153,.1), rgba(255,255,255,.02));border:1px solid rgba(54,217,153,.25);border-radius:28px;padding:clamp(32px,5vw,52px)\">\n      <div style=\"font-size:40px;margin-bottom:18px\">🔒<\u002Fdiv>\n      <h2 style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:clamp(22px,3vw,32px);letter-spacing:-.02em;margin-bottom:16px\">Seu certificado é oficial — ou a gente resolve.<\u002Fh2>\n      <p style=\"font-size:clamp(15px,1.6vw,18px);line-height:1.65;color:#b3bdcd;max-width:620px;margin:0 auto\">Somos credenciados e respondemos por cada certificado emitido. Se por qualquer falha técnica da nossa parte o certificado não for válido ou não funcionar, entramos em contato e corrigimos sem custo adicional. <span style=\"color:#e7ecf4\">A responsabilidade é nossa.<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ URGENCY ============ -->\n  <sc-if value=\"{{ showUrgency }}\" hint-placeholder-val=\"{{ true }}\">\n    <section style=\"position:relative;z-index:2;max-width:1080px;margin:0 auto;padding:0 28px 40px\">\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;background:rgba(255,209,102,.07);border:1px solid rgba(255,209,102,.2);border-radius:16px;padding:18px 24px;text-align:center\">\n        <span style=\"font-size:20px\">⏰<\u002Fspan>\n        <span style=\"font-size:15.5px;color:#e8d9b0;font-weight:500\">Agendamentos feitos até as 18h têm emissão garantida no mesmo dia útil.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- ============ FAQ ============ -->\n  <section id=\"faq\" style=\"position:relative;z-index:2;max-width:880px;margin:0 auto;padding:50px 28px\">\n    <h2 style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:clamp(26px,3.4vw,42px);letter-spacing:-.02em;text-align:center;margin-bottom:40px\">Perguntas frequentes<\u002Fh2>\n    <div style=\"display:flex;flex-direction:column;gap:12px\">\n      <sc-for list=\"{{ faqs }}\" as=\"f\" hint-placeholder-count=\"8\">\n        <div style=\"background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);border-radius:16px;overflow:hidden\">\n          <button onclick=\"{{ f.toggle }}\" style=\"width:100%;display:flex;align-items:center;justify-content:space-between;gap:16px;background:none;border:none;cursor:pointer;padding:20px 24px;text-align:left;color:#e7ecf4;font-family:'Sora',sans-serif;font-weight:600;font-size:16px\">\n            <span>{{ f.q }}<\u002Fspan>\n            <span style=\"flex:none;font-size:22px;color:{{ accent }};transform:{{ f.rot }};transition:transform .2s\">+<\u002Fspan>\n          <\u002Fbutton>\n          <sc-if value=\"{{ f.open }}\" hint-placeholder-val=\"\">\n            <div style=\"padding:0 24px 22px;font-size:15px;line-height:1.65;color:#a7b3c6\">{{ f.a }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FINAL CTA ============ -->\n  <section data-screen-label=\"Final CTA\" style=\"position:relative;z-index:2;max-width:1080px;margin:0 auto;padding:60px 28px 30px\">\n    <div style=\"position:relative;text-align:center;background:linear-gradient(160deg, rgba(28,86,148,.3), rgba(7,11,22,.4));border:1px solid rgba(77,184,255,.22);border-radius:30px;padding:clamp(40px,6vw,70px) clamp(28px,5vw,56px);overflow:hidden\">\n      <div style=\"position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:560px;height:560px;background:radial-gradient(circle,rgba(54,217,153,.16),rgba(7,11,22,0) 65%);pointer-events:none\"><\u002Fdiv>\n      <div style=\"position:relative\">\n        <h2 style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:clamp(28px,4vw,48px);letter-spacing:-.025em;line-height:1.1;margin-bottom:18px\">Chega de adiar o que você<br>pode resolver hoje.<\u002Fh2>\n        <p style=\"font-size:clamp(16px,1.7vw,19px);line-height:1.6;color:#a7b3c6;max-width:600px;margin:0 auto 34px\">Assine contratos, emita notas fiscais e acesse o Gov.br sem sair do lugar. A emissão é rápida, o atendimento é humano e a credencial é oficial.<\u002Fp>\n        <a href=\"#\" style=\"display:inline-flex;align-items:center;gap:10px;background:{{ accent }};color:#05130c;font-family:'Sora',sans-serif;font-weight:700;font-size:17px;padding:18px 36px;border-radius:999px;text-decoration:none;box-shadow:0 14px 44px rgba(54,217,153,.34)\">EMITIR MEU CERTIFICADO AGORA →<\u002Fa>\n        <div style=\"display:flex;justify-content:center;flex-wrap:wrap;gap:18px;font-size:13.5px;color:#9aa6ba;margin-top:24px\">\n          <span>📹 Videoconferência<\u002Fspan><span>✅ Credenciada<\u002Fspan><span>🔒 100% Seguro<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ PS ============ -->\n  <section style=\"position:relative;z-index:2;max-width:760px;margin:0 auto;padding:30px 28px 60px\">\n    <p style=\"font-size:15.5px;line-height:1.7;color:#94a0b4\"><span style=\"font-family:'Sora',sans-serif;font-weight:700;color:#dde4ee\">P.S.<\u002Fspan> Certificado digital não é luxo — é exigência pra quem quer operar com agilidade hoje. Emitir com a Absoluta é fazer isso do jeito mais rápido, seguro e sem sair de casa. Garanta o seu enquanto ainda há horário disponível esta semana.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ============ FOOTER ============ -->\n  <footer style=\"position:relative;z-index:2;border-top:1px solid rgba(255,255,255,.07);margin-top:20px\">\n    <div style=\"max-width:1140px;margin:0 auto;padding:40px 28px;display:flex;flex-wrap:wrap;gap:24px;align-items:center;justify-content:space-between\">\n      <div style=\"display:flex;align-items:center;gap:11px\">\n        <svg width=\"22\" height=\"26\" viewBox=\"0 0 200 240\" fill=\"none\"><path d=\"M100 16 L182 48 L182 120 C182 182 145 214 100 230 C55 214 18 182 18 120 L18 48 Z\" stroke=\"#36d399\" stroke-width=\"11\" fill=\"rgba(54,217,153,.06)\"><\u002Fpath><path d=\"M70 118 L92 142 L134 92\" stroke=\"#36d399\" stroke-width=\"13\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n        <span style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:16px\">Absoluta Certificadora<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:12.5px;color:#6b7689;max-width:520px;line-height:1.6\">Autoridade de Registro credenciada na cadeia ICP-Brasil. Ao prosseguir, você concorda com nossa <a href=\"#\" style=\"color:#9fd6ff;text-decoration:underline\">Política de Privacidade<\u002Fa> e com o tratamento dos seus dados conforme a LGPD.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:900},&quot;headline&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;A&quot;,&quot;B&quot;,&quot;C&quot;],&quot;default&quot;:&quot;A&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#36d399&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showUrgency&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { coupon: \"\", couponMsg: \"\", openFaq: 0 };\n\n  renderVals() {\n    const accent = this.props.accent ?? \"#36d399\";\n    const headlines = {\n      A: \"Seu Certificado Digital em Minutos, Sem Sair de Casa\",\n      B: \"Chega de Perder Tempo na Fila pra Tirar Certificado Digital\",\n      C: \"Certificado Digital Oficial, Emitido Online, Direto pelo Celular\"\n    };\n    const headlineMain = headlines[this.props.headline] ?? headlines.A;\n\n    const pains = [\n      { icon: \"😤\", text: \"Perdeu negócio porque não tinha o certificado na hora certa\" },\n      { icon: \"🕐\", text: \"Ficou horas tentando entender onde e como emitir\" },\n      { icon: \"🚗\", text: \"Teve que se deslocar até um ponto de atendimento — às vezes mais de uma vez\" },\n      { icon: \"📋\", text: \"Levou documento, encheu formulário e ainda assim não saiu com o certificado no dia\" },\n      { icon: \"💻\", text: \"Tentou emitir por conta própria e travou na instalação\" },\n      { icon: \"🏦\", text: \"Precisou assinar contrato, acessar o banco ou emitir NF-e e ficou sem conseguir\" }\n    ];\n\n    const steps = [\n      { n: \"1\", title: \"Agende\", body: \"Escolha o melhor horário pra sua videoconferência.\" },\n      { n: \"2\", title: \"Entre na chamada\", body: \"Um especialista te recebe e conduz tudo ao vivo.\" },\n      { n: \"3\", title: \"Mostre os documentos\", body: \"Apresente seus documentos pela câmera. Rápido.\" },\n      { n: \"4\", title: \"Pronto\", body: \"Certificado emitido e instalado no seu dispositivo.\" }\n    ];\n\n    const benefits = [\n      { title: \"Emite de onde estiver\", body: \"Basta um celular ou computador com câmera.\" },\n      { title: \"Validade jurídica total\", body: \"Reconhecido em bancos, Receita Federal, cartórios e sistemas gov.\" },\n      { title: \"Atendimento humano\", body: \"Um especialista te guia passo a passo na videoconferência.\" },\n      { title: \"Sem precisar de tecnologia\", body: \"O processo foi feito pra qualquer pessoa conseguir.\" },\n      { title: \"No mesmo dia\", body: \"Agende e emita hoje, sem esperar dias ou semanas.\" },\n      { title: \"Cupom de desconto\", body: \"Pague menos do que encontra por aí, com desconto real.\" },\n      { title: \"Credenciada e oficial\", body: \"Segurança total, sem risco de certificado inválido.\" }\n    ];\n\n    const stats = [\n      { icon: \"🔒\", label: \"AR Credenciada Oficialmente\" },\n      { icon: \"⭐\", label: \"+[nº] clientes atendidos\" },\n      { icon: \"📹\", label: \"100% das emissões por videoconferência\" },\n      { icon: \"✅\", label: \"Válido em todo o território nacional\" }\n    ];\n\n    const testimonials = [\n      { quote: \"Emiti em poucos minutos sem sair de casa. Não acreditei como foi fácil.\", author: \"[Nome, Profissão]\" },\n      { quote: \"Tinha medo de comprar online, mas foi tudo muito seguro e o suporte me ajudou em tudo.\", author: \"[Nome, Cidade]\" },\n      { quote: \"Precisava do certificado no mesmo dia pra fechar um contrato. Consegui em menos de 1 hora.\", author: \"[Nome, Empresa]\" },\n      { quote: \"Não entendo nada de tecnologia e consegui sozinho — o atendente me ajudou em cada etapa.\", author: \"[Nome, Profissão]\" }\n    ];\n\n    const plans = [\n      {\n        icon: \"🏢\", name: \"e-CNPJ A1\", audience: \"Para empresas — MEI, ME, LTDA, S/A\", price: \"200,00\",\n        features: [\n          \"Certificado e-CNPJ A1 (validade 1 ano)\",\n          \"Emissão 100% por videoconferência\",\n          \"Atendimento com especialista incluso\",\n          \"Suporte na instalação\",\n          \"Válido na Receita Federal, eSocial, NF-e e + sistemas\"\n        ],\n        bg: \"linear-gradient(160deg, rgba(28,86,148,.22), rgba(255,255,255,.02))\",\n        border: \"rgba(77,184,255,.3)\",\n        cta: \"Emitir e-CNPJ agora\",\n        ctaBg: accent, ctaColor: \"#05130c\", ctaShadow: \"box-shadow:0 10px 30px rgba(54,217,153,.3)\"\n      },\n      {\n        icon: \"👤\", name: \"e-CPF A1\", audience: \"Para pessoa física\", price: \"145,00\",\n        features: [\n          \"Certificado e-CPF A1 (validade 1 ano)\",\n          \"Emissão 100% por videoconferência\",\n          \"Atendimento com especialista incluso\",\n          \"Suporte na instalação\",\n          \"Válido no Gov.br, Receita Federal, cartórios e + sistemas\"\n        ],\n        bg: \"rgba(255,255,255,.035)\",\n        border: \"rgba(255,255,255,.1)\",\n        cta: \"Emitir e-CPF agora\",\n        ctaBg: \"rgba(255,255,255,.1)\", ctaColor: \"#f2f5fa\", ctaShadow: \"\"\n      }\n    ];\n\n    const objections = [\n      { q: \"Comprar certificado digital online é seguro?\", a: \"Totalmente. Somos uma AR credenciada e operamos dentro das normas do ICP-Brasil. Seus dados são protegidos e o processo segue os mesmos protocolos de qualquer banco digital.\" },\n      { q: \"Preciso entender de tecnologia pra emitir?\", a: \"Não precisa saber nada. Na videoconferência, nosso especialista te orienta em cada etapa — do começo até o certificado instalado. Você só precisa de câmera e documento.\" },\n      { q: \"O certificado vai ser válido mesmo?\", a: \"Sim. Somos credenciados dentro da cadeia ICP-Brasil. Seu certificado tem a mesma validade jurídica de qualquer outro emitido no país — Receita Federal, cartórios, bancos, eSocial, NF-e.\" },\n      { q: \"E se eu tiver problema depois de emitir?\", a: \"Nossa equipe continua disponível após a emissão. Você não fica abandonado depois que a venda acontece.\" },\n      { q: \"Por que é mais barato do que outros lugares?\", a: \"Porque operamos online, sem estrutura física de cartório. Essa economia repassamos pra você — com desconto real, não maquiado.\" }\n    ];\n\n    const faqRaw = [\n      { q: \"Quanto tempo leva a emissão?\", a: \"A videoconferência costuma durar de 10 a 20 minutos. Depois disso, o certificado já fica disponível pra instalação no mesmo dia.\" },\n      { q: \"Serve pra qualquer tipo de empresa ou pessoa?\", a: \"Sim. Emitimos e-CPF pra qualquer pessoa física e e-CNPJ pra empresas de qualquer porte — MEI, ME, LTDA, S/A.\" },\n      { q: \"Preciso ir a algum lugar?\", a: \"Não. Todo o processo é por videoconferência. Você só precisa de um celular ou computador com câmera e seus documentos em mãos.\" },\n      { q: \"Quais documentos são necessários?\", a: \"Para e-CPF: documento de identidade com foto (RG ou CNH) e CPF. Para e-CNPJ: CNPJ ativo, documento do sócio responsável e comprovante de endereço da empresa. (Confirmar lista exata antes de publicar.)\" },\n      { q: \"O certificado funciona em qual sistema?\", a: \"Em todos os que aceitam certificado ICP-Brasil: Receita Federal, Gov.br, eSocial, NF-e, SPED, cartórios, bancos e muito mais.\" },\n      { q: \"Como funciona o pagamento?\", a: \"Aceitamos cartão de crédito, Pix e boleto bancário. Há cupom de desconto disponível — aplique no campo indicado antes de finalizar.\" },\n      { q: \"E se eu tiver dificuldade na instalação?\", a: \"Nosso especialista te acompanha durante a videoconferência até o certificado estar instalado e funcionando. Você não fica sozinho.\" },\n      { q: \"Tem suporte após a emissão?\", a: \"Sim. Nossa equipe está disponível para auxiliar em dúvidas pós-emissão.\" }\n    ];\n    const faqs = faqRaw.map((f, i) => ({\n      q: f.q, a: f.a,\n      open: this.state.openFaq === i,\n      rot: this.state.openFaq === i ? \"rotate(45deg)\" : \"rotate(0deg)\",\n      toggle: () => this.setState(s => ({ openFaq: s.openFaq === i ? -1 : i }))\n    }));\n\n    return {\n      accent, headlineMain,\n      showUrgency: this.props.showUrgency ?? true,\n      pains, steps, benefits, stats, testimonials, plans, objections, faqs,\n      coupon: this.state.coupon,\n      couponMsg: this.state.couponMsg,\n      onCoupon: (e) => this.setState({ coupon: e.target.value, couponMsg: \"\" }),\n      applyCoupon: () => {\n        const c = (this.state.coupon || \"\").trim();\n        this.setState({ couponMsg: c ? `Cupom \"${c.toUpperCase()}\" será validado no checkout. ✓` : \"Digite um cupom para aplicar.\" });\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
